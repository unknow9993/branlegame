<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEON GAMER</title>

  <link rel="stylesheet" href="style.css">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="bg-glow"></div>

<header>

  <div class="logo">
    🔥 NEON GAMER
  </div>

  <div class="top-right">

    <div class="rank-box">
      🏆 <span id="rankName">Débutant</span>
    </div>

    <div class="coins-box">
      🟠 <span id="coins">0</span>
    </div>

  </div>

</header>

<main>

<section class="hero-card">

  <h1 id="username">
    Joueur
  </h1>

  <p>
    Progression ultime
  </p>

  <div class="xp-bar">

    <div class="xp-fill" id="xpFill"></div>

  </div>

  <div class="stats-grid">

    <div class="stat">
      <h2 id="actions">0</h2>
      <span>Actions</span>
    </div>

    <div class="stat">
      <h2 id="rebirths">0</h2>
      <span>Rebirths</span>
    </div>

    <div class="stat">
      <h2 id="battleLevel">1</h2>
      <span>Battle Pass</span>
    </div>

  </div>

</section>

<section class="action-section">

  <button class="big-btn" onclick="addAction()">
    ⚡ Faire une action
  </button>

  <button class="rebirth-btn" onclick="rebirthPlayer()">
    🔄 REBIRTH
  </button>

</section>

<section class="penis-section">

  <h2>
    🔥 Évolution
  </h2>

  <div class="evolution-container">

    <div id="evolutionBar"></div>

  </div>

</section>

<section class="battlepass">

  <h2>
    🎟️ Battle Pass
  </h2>

  <div class="battle-grid" id="battleGrid"></div>

</section>

<section class="missions">

  <h2>
    🎯 Défis Quotidiens
  </h2>

  <div class="mission-card">
    <p>Faire 10 actions</p>
    <button onclick="claimMission(50)">
      Récompense +50
    </button>
  </div>

  <div class="mission-card">
    <p>Faire un rebirth</p>
    <button onclick="claimMission(150)">
      Récompense +150
    </button>
  </div>

</section>

<section class="shop">

  <h2>
    🛒 Boutique
  </h2>

  <div class="shop-grid">

    <div class="shop-card">
      <h3>⚡ Boost XP</h3>
      <p>Double XP</p>
      <button onclick="buyItem('boost',100)">
        Acheter
      </button>
    </div>

    <div class="shop-card">
      <h3>👑 VIP</h3>
      <p>Aura Orange</p>
      <button onclick="buyItem('vip',250)">
        Acheter
      </button>
    </div>

    <div class="shop-card">
      <h3>🔥 Aura</h3>
      <p>Glow spécial</p>
      <button onclick="buyItem('aura',400)">
        Acheter
      </button>
    </div>

  </div>

</section>

<section class="friends">

  <h2>
    👥 Amis
  </h2>

  <div class="friend-add">

    <input type="text" id="friendInput"
    placeholder="Ajouter un ami">

    <button onclick="addFriend()">
      Ajouter
    </button>

  </div>

  <div id="friendList"></div>

</section>

<section class="leaderboard">

  <h2>
    🏆 Classement
  </h2>

  <div class="leader-card">

    <h3 id="leaderName">
      Joueur
    </h3>

    <p>
      Score :
      <span id="leaderScore">0</span>
    </p>

  </div>

</section>

</main>

<div class="notif" id="notif"></div>

<script src="script.js"></script>

</body>
</html>
